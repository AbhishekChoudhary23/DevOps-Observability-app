server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API traffic directly to backend pod
    location /api/ {
        proxy_pass http://localhost:5000; # We'll tweak this address context for K8s later
        proxy_http_version 1.1;
    }
}